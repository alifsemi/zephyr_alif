description: Alif Pulse Density Module

compatible: "alif,alif-pdm"

include: [base.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  fifo_watermark:
    type: int
    required: true
    description: Fifo watermark threshold value
    enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7

  bypass_iir_filter:
    type: int
    required: true
    description: Bypass IIR filter
    enum:
      - 0
      - 1

  dmas:
    description: |
      Optional RX dma specifier. Each specifier will have a phandle
      reference to the event router, the encoded channel info
      with channel number dma group and handshake, and peripheral request number.
      Use evtrtr2 for HE core and evtrtr0 for HP core.
      For example dmas for RX on PDM
        dmas = <&evtrtr2 ALIF_DMA_ENCODE(0, 0, 1) 19>;

  dma-names:
    description: |
      Required if the dmas property exists. This should be "rxdma"
      to match the dmas property.
      For example
        dma-names = "rxdma";
