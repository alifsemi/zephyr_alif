# Common CDC NCM configuration for Alif boards

# Enable USB device stack (device_next)
CONFIG_USB_DEVICE_STACK_NEXT=y

# Enable DWC3 USB driver
CONFIG_UDC_DWC3=y
CONFIG_UDC_DWC3_ALIF=y

# Enable CDC NCM class
CONFIG_USBD_CDC_NCM_CLASS=y
CONFIG_USBD_CDC_NCM_MAX_DGRAM_PER_NTB=2

# Enable Ethernet L2
CONFIG_NET_L2_ETHERNET=y

# Sample USB device configuration
CONFIG_SAMPLE_USBD_PID=0x0001
CONFIG_SAMPLE_USBD_PRODUCT="Alif CDC NCM Ethernet"
CONFIG_SAMPLE_USBD_MANUFACTURER="Alif Semiconductor"

# Logging for debugging
CONFIG_LOG=y
CONFIG_USBD_CDC_NCM_LOG_LEVEL_INF=y
CONFIG_UDC_DRIVER_LOG_LEVEL_INF=y

# Increase stack size for USB operations
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096

# Network configuration for USB NCM (static IP for testing)
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.7.2"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.168.7.1"
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_NEED_IPV4=y

# Increase network buffer counts for USB NCM
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_IF_UNICAST_IPV4_ADDR_COUNT=2
